<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ανάκτηση Κωδικού - Μεροκαματάκι</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#3b82f6', secondary: '#10b981' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Ανάκτηση Κωδικού</h1>
            <p class="text-gray-500">Εισάγετε το email σας για να λάβετε τον σύνδεσμο επαναφοράς</p>
        </div>
        
        <div class="space-y-5" id="forgotForm">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="emailInput" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="name@example.com">
            </div>
            <button id="sendBtn" class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md mt-4">
                Αποστολή Email
            </button>
            <div class="text-center mt-4">
                <a href="index.html" class="text-sm text-primary hover:text-blue-700 font-medium">Επιστροφή στην Είσοδο</a>
            </div>
        </div>
        <div id="message" class="hidden mt-4 p-3 rounded text-center text-sm font-medium"></div>
    </div>

    <script>
        document.getElementById('sendBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            if (!email) return alert('Παρακαλώ εισάγετε το email σας.');
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = 'Αποστολή...';
            
            try {
                const res = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                const msgEl = document.getElementById('message');
                msgEl.classList.remove('hidden');
                
                if (res.ok) {
                    msgEl.className = 'mt-4 p-3 rounded text-center text-sm font-medium bg-green-100 text-green-800';
                    msgEl.textContent = 'Το email εστάλη! Ελέγξτε τα εισερχόμενά σας.';
                } else {
                    msgEl.className = 'mt-4 p-3 rounded text-center text-sm font-medium bg-red-100 text-red-800';
                    msgEl.textContent = data.error || 'Σφάλμα κατά την αποστολή.';
                    btn.disabled = false;
                    btn.textContent = 'Αποστολή Email';
                }
            } catch (err) {
                alert('Αδυναμία σύνδεσης με τον server.');
                btn.disabled = false;
                btn.textContent = 'Αποστολή Email';
            }
        });
    </script>
</body>
</html>
