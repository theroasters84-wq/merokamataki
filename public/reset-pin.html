<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Νέο PIN - Μεροκαματάκι</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#3b82f6', secondary: '#10b981' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Νέο PIN</h1>
            <p class="text-gray-500">Ορίστε το νέο σας PIN ιδιοκτήτη</p>
        </div>
        
        <div class="space-y-5" id="resetForm">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Νέο 4-ψήφιο PIN</label>
                <input type="password" id="newPin" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none text-center text-2xl tracking-[0.5em]" placeholder="••••">
            </div>
            <button id="resetBtn" class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md mt-4">
                Αποθήκευση
            </button>
        </div>
        <div id="message" class="hidden mt-4 p-3 rounded text-center text-sm font-medium"></div>
        <div class="text-center mt-4 hidden" id="loginLink">
            <a href="index.html" class="text-sm text-primary hover:text-blue-700 font-medium">Επιστροφή στην Εφαρμογή</a>
        </div>
    </div>

    <script>
        document.getElementById('resetBtn').addEventListener('click', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const newPin = document.getElementById('newPin').value.trim();
            
            if (!token) return alert('Μη έγκυρο link (λείπει το token).');
            if (!newPin) return alert('Παρακαλώ εισάγετε το νέο PIN.');
            
            try {
                const res = await fetch('/api/pin/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPin })
                });
                const data = await res.json();
                const msgEl = document.getElementById('message');
                msgEl.classList.remove('hidden');
                
                if (res.ok) {
                    msgEl.className = 'mt-4 p-3 rounded text-center text-sm font-medium bg-green-100 text-green-800';
                    msgEl.textContent = 'Το PIN ενημερώθηκε επιτυχώς!';
                    document.getElementById('resetForm').classList.add('hidden');
                    document.getElementById('loginLink').classList.remove('hidden');
                } else {
                    msgEl.className = 'mt-4 p-3 rounded text-center text-sm font-medium bg-red-100 text-red-800';
                    msgEl.textContent = data.error || 'Σφάλμα κατά την ενημέρωση.';
                }
            } catch (err) {
                alert('Αδυναμία σύνδεσης με τον server.');
            }
        });
    </script>
</body>
</html>
